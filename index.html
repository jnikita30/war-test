<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Message For You ❤️</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;overflow:hidden;background:linear-gradient(135deg,#ffdde1,#ee9ca7);height:100vh}
#hearts{position:fixed;inset:0;pointer-events:none}
.heart{position:absolute;color:rgba(255,255,255,.8);animation:floatUp linear forwards}
@keyframes floatUp{from{transform:translateY(100vh) scale(.5);opacity:0}20%{opacity:1}to{transform:translateY(-120px) scale(1.2);opacity:0}}
.screen{position:absolute;inset:0;display:flex;justify-content:center;align-items:center;flex-direction:column;text-align:center;padding:30px}
.card{background:rgba(255,255,255,.18);backdrop-filter:blur(10px);border-radius:25px;padding:40px;max-width:750px;color:white;box-shadow:0 8px 30px rgba(0,0,0,.15)}
button{margin-top:25px;border:none;padding:15px 28px;border-radius:999px;cursor:pointer;font-size:16px;font-weight:bold}
#messageScreen{display:none}
#typedText{font-size:1.2rem;line-height:1.9;min-height:380px;white-space:pre-line}
.cursor{display:inline-block;animation:blink .8s infinite}
@keyframes blink{50%{opacity:0}}
#finalReveal{display:none;position:absolute;inset:0;background:rgba(0,0,0,.25);justify-content:center;align-items:center;flex-direction:column;text-align:center;color:white}
.finalText{font-size:4rem;font-weight:700}
</style>
</head>
<body>
<div id="hearts"></div>
<div id="introScreen" class="screen">
<div class="card">
<h1>📩 You Have 1 Unread Message</h1>
<p>Someone has something special to tell you...</p>
<button onclick="startSurprise()">Click To Open ❤️</button>
</div>
</div>
<div id="messageScreen" class="screen">
<div class="card"><div id="typedText"></div></div>
</div>
<div id="finalReveal">
<div class="finalText">❤️ Tum jaisa koi nahi ❤️</div>
<div>And that's the one thing I'm absolutely sure about.</div>
</div>
<script>
const message=`I don't just love you because you're good to see.

I love you because every conversation with you teaches me something.

Your thinking inspires me.
Your words bring clarity to my mind.

For all that you are and all that you do,
I am endlessly grateful for you.

I'm not perfect yet, but I promise I'll keep working on myself and improve.

If there's one thing I'm absolutely sure of, it's this...`;

function startSurprise(){
document.getElementById('introScreen').style.display='none';
document.getElementById('messageScreen').style.display='flex';
const target=document.getElementById('typedText');
let i=0;
const typing=setInterval(()=>{
target.innerHTML=message.substring(0,i)+'<span class="cursor">|</span>';
i++;
if(i>message.length){
clearInterval(typing);
setTimeout(()=>{
document.getElementById('messageScreen').style.display='none';
document.getElementById('finalReveal').style.display='flex';
},2500);
}
},45);
}
function createHeart(){
const heart=document.createElement('div');
heart.classList.add('heart');
heart.innerHTML='❤️';
heart.style.left=Math.random()*100+'vw';
heart.style.fontSize=(15+Math.random()*25)+'px';
const duration=4+Math.random()*5;
heart.style.animationDuration=duration+'s';
document.getElementById('hearts').appendChild(heart);
setTimeout(()=>heart.remove(),duration*1000);
}
setInterval(createHeart,300);
</script>
</body>
</html>
