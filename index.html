```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Aman ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI',sans-serif;
    overflow:hidden;
    height:100vh;
    background:linear-gradient(135deg,#FFD1DC,#FAD0C4,#FFE5EC);
}

#hearts{
    position:fixed;
    inset:0;
    pointer-events:none;
}

.heart{
    position:absolute;
    color:rgba(255,255,255,0.9);
    animation:floatUp linear forwards;
}

@keyframes floatUp{
    from{
        transform:translateY(100vh) scale(.5);
        opacity:0;
    }
    20%{
        opacity:1;
    }
    to{
        transform:translateY(-120px) scale(1.2);
        opacity:0;
    }
}

.screen{
    position:absolute;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    padding:30px;
}

.card{
    background:rgba(255,255,255,0.93);
    color:#5C0011; /* Dark Maroon */
    backdrop-filter:blur(12px);
    border-radius:25px;
    padding:40px;
    max-width:800px;
    width:90%;
    box-shadow:0 10px 35px rgba(0,0,0,.18);
}

h1{
    margin-bottom:15px;
    color:#800020; /* Burgundy */
    font-size:2rem;
}

p{
    line-height:1.8;
}

button{
    margin-top:25px;
    border:none;
    padding:15px 30px;
    border-radius:999px;
    cursor:pointer;
    font-size:16px;
    font-weight:600;
    background:#800020;
    color:white;
    transition:.3s;
}

button:hover{
    transform:scale(1.05);
    background:#5C0011;
}

#messageScreen{
    display:none;
}

#typedText{
    font-size:1.15rem;
    line-height:2;
    min-height:450px;
    text-align:left;
    white-space:pre-line;
    color:#5C0011;
}

.cursor{
    animation:blink .8s infinite;
}

@keyframes blink{
    50%{
        opacity:0;
    }
}

#finalReveal{
    display:none;
    position:absolute;
    inset:0;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
    background:rgba(92,0,17,0.15);
    color:white;
    animation:fadeIn 2s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
    }
    to{
        opacity:1;
    }
}

.finalText{
    font-size:4rem;
    font-weight:700;
    color:#FFD7E0;
    text-shadow:
        0 0 15px rgba(255,215,224,.9),
        0 0 30px rgba(255,215,224,.7);
    animation:pulse 2s infinite;
}

@keyframes pulse{
    0%,100%{
        transform:scale(1);
    }
    50%{
        transform:scale(1.08);
    }
}

.sub{
    margin-top:25px;
    font-size:1.3rem;
    max-width:700px;
    line-height:1.8;
    color:white;
}

.signature{
    margin-top:35px;
    font-size:1rem;
    color:white;
    opacity:.95;
}

@media(max-width:768px){

    .card{
        padding:25px;
    }

    .finalText{
        font-size:2.3rem;
        padding:0 15px;
    }

    .sub{
        font-size:1rem;
        padding:0 25px;
    }

    #typedText{
        font-size:1rem;
        min-height:520px;
    }
}
</style>
</head>

<body>

<div id="hearts"></div>

<div id="introScreen" class="screen">
    <div class="card">
        <h1>📩 A Message For Aman ❤️</h1>

        <p>
            Someone has been carrying these words in their heart
            for quite some time...
        </p>

        <button onclick="startSurprise()">
            Click To Open ❤️
        </button>
    </div>
</div>

<div id="messageScreen" class="screen">
    <div class="card">
        <div id="typedText"></div>
    </div>
</div>

<div id="finalReveal">

    <div class="finalText">
        ❤️ Aman, Tum Jaisa Koi Nahi ❤️
    </div>

    <div class="sub">
        Of all the people in the world,<br>
        I'm grateful my heart found you.
    </div>

    <div class="signature">
        Made with ❤️ just for Aman
    </div>

</div>

<script>

const message = `Dear Aman,

I don't just love you because you're good to see.

I love you because every conversation with you teaches me something.

Your thinking inspires me.

Your words bring clarity to my mind.

You challenge me to grow,
to see things differently,
and to become better than I was yesterday.

For all that you are and all that you do,
I am endlessly grateful for you.

I'm not perfect yet,
but I promise I'll keep working on myself and improve.

And Aman,

if there's one thing I'm absolutely sure of, it's this...`;

function startSurprise(){

    document.getElementById("introScreen").style.display = "none";
    document.getElementById("messageScreen").style.display = "flex";

    const target = document.getElementById("typedText");
    let i = 0;

    const typing = setInterval(() => {

        target.innerHTML =
            message.substring(0, i) +
            '<span class="cursor">|</span>';

        i++;

        if(i > message.length){

            clearInterval(typing);

            setTimeout(() => {

                document.getElementById("messageScreen").style.display = "none";
                document.getElementById("finalReveal").style.display = "flex";

            }, 3000);
        }

    }, 45);
}

function createHeart(){

    const heart = document.createElement("div");

    heart.classList.add("heart");
    heart.innerHTML = "❤️";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (15 + Math.random() * 25) + "px";

    const duration = 4 + Math.random() * 5;

    heart.style.animationDuration = duration + "s";

    document.getElementById("hearts").appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, duration * 1000);
}

setInterval(createHeart, 300);

</script>

</body>
</html>
```
